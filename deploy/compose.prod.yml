services:
  backend:
    labels:
      traefik.enable: "true"
      traefik.http.routers.despesas-app.rule: Host(`${APP_PUBLIC_HOST:?APP_PUBLIC_HOST must be set}`)
      traefik.http.routers.despesas-app.entrypoints: ${TRAEFIK_ENTRYPOINTS:-websecure}
      traefik.http.routers.despesas-app.tls: "true"
      traefik.http.routers.despesas-app.tls.certresolver: ${TRAEFIK_CERTRESOLVER:-letsencrypt}
      traefik.http.services.despesas-app.loadbalancer.server.port: "8080"

  n8n:
    labels:
      traefik.enable: "true"
      traefik.http.routers.despesas-n8n.rule: Host(`${N8N_PUBLIC_HOST:?N8N_PUBLIC_HOST must be set}`)
      traefik.http.routers.despesas-n8n.entrypoints: ${TRAEFIK_ENTRYPOINTS:-websecure}
      traefik.http.routers.despesas-n8n.tls: "true"
      traefik.http.routers.despesas-n8n.tls.certresolver: ${TRAEFIK_CERTRESOLVER:-letsencrypt}
      traefik.http.services.despesas-n8n.loadbalancer.server.port: "5678"
