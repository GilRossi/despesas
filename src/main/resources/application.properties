spring.application.name=despesas

# Dados do banco PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/despesasdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configura JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SHOW_SQL:false}

# Timezone correto
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Segurança da API mobile
app.security.token-secret=${APP_SECURITY_TOKEN_SECRET:}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
