spring.application.name=despesas

# Front-door do Flutter Web oficial.
# Use APP_FRONTEND_WEB_DIST com um resource location Spring, por exemplo:
# file:/opt/despesas/frontend-web/
spring.web.resources.static-locations=${APP_FRONTEND_WEB_DIST:classpath:/static/},classpath:/static/

# Dados do banco PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/despesasdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configura JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=${APP_SHOW_SQL:false}

# Timezone correto
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Segurança da API mobile
app.security.token-secret=${APP_SECURITY_TOKEN_SECRET:}
app.operational.email-ingestion.token=${APP_OPERATIONAL_EMAIL_INGESTION_TOKEN:}
app.bootstrap.platform-admin.name=${APP_BOOTSTRAP_PLATFORM_ADMIN_NAME:}
app.bootstrap.platform-admin.email=${APP_BOOTSTRAP_PLATFORM_ADMIN_EMAIL:}
app.bootstrap.platform-admin.password=${APP_BOOTSTRAP_PLATFORM_ADMIN_PASSWORD:}
app.financial-assistant.ai.enabled=${FINANCIAL_ASSISTANT_AI_ENABLED:false}
app.financial-assistant.ai.api-key=${DEEPSEEK_API_KEY:}
app.financial-assistant.ai.base-url=${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
app.financial-assistant.ai.model=${DEEPSEEK_MODEL:deepseek-chat}
app.financial-assistant.ai.log-requests=${DEEPSEEK_LOG_REQUESTS:false}
app.financial-assistant.ai.log-responses=${DEEPSEEK_LOG_RESPONSES:false}
app.financial-assistant.ai.temperature=${DEEPSEEK_TEMPERATURE:0.1}
app.financial-assistant.ai.max-completion-tokens=${DEEPSEEK_MAX_COMPLETION_TOKENS:220}
app.financial-assistant.ai.timeout-seconds=${DEEPSEEK_TIMEOUT_SECONDS:20}
app.financial-assistant.ai.max-retries=${DEEPSEEK_MAX_RETRIES:1}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
