<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title th:text="${despesa.id != null} ? 'Editar Despesa' : 'Nova Despesa'">Nova Despesa</title>
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
		rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
		crossorigin="anonymous">
</head>
<body class="container mt-4">
	<h1 th:text="${despesa.id != null} ? 'Editar Despesa' : 'Nova Despesa'">Nova Despesa</h1>

	<form th:action="@{/despesas/salvar}" th:object="${despesa}"
		method="post" class="needs-validation" novalidate>
		<input type="hidden" th:field="*{id}">

		<div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}">
			<p class="mb-0" th:each="erro : ${#fields.globalErrors()}" th:text="${erro}"></p>
		</div>

		<div class="mb-3">
			<label class="form-label" for="descricao">Descrição</label>
			<input type="text"
				th:field="*{descricao}" class="form-control"
				th:classappend="${#fields.hasErrors('descricao')} ? ' is-invalid' : ''"
				required maxlength="140">
			<div class="invalid-feedback" th:errors="*{descricao}"></div>
		</div>

		<div class="mb-3">
			<label class="form-label" for="valor">Valor</label>
			<input type="number"
				th:field="*{valor}" class="form-control"
				th:classappend="${#fields.hasErrors('valor')} ? ' is-invalid' : ''"
				required min="0.01" step="0.01">
			<div class="invalid-feedback" th:errors="*{valor}"></div>
		</div>

		<div class="mb-3">
			<label class="form-label" for="data">Vencimento</label>
			<input type="date"
				th:field="*{data}" class="form-control"
				th:classappend="${#fields.hasErrors('data')} ? ' is-invalid' : ''"
				required>
			<div class="invalid-feedback" th:errors="*{data}"></div>
		</div>

		<div class="mb-3">
			<label class="form-label" for="contexto">Contexto</label>
			<select
				th:field="*{contexto}"
				class="form-select"
				th:classappend="${#fields.hasErrors('contexto')} ? ' is-invalid' : ''"
				required>
				<option value="">Selecione o contexto</option>
				<option th:each="contexto : ${contextos}" th:value="${contexto}" th:text="${contexto}"></option>
			</select>
			<div class="invalid-feedback" th:errors="*{contexto}"></div>
		</div>

		<div class="mb-3">
			<label class="form-label" for="categoriaId">Categoria</label>
			<select
				id="categoriaId"
				th:field="*{categoriaId}"
				class="form-select"
				th:classappend="${#fields.hasErrors('categoriaId')} ? ' is-invalid' : ''"
				required>
				<option value="">Selecione a categoria</option>
				<option th:each="categoria : ${catalogo}" th:value="${categoria.id}" th:text="${categoria.name}"></option>
			</select>
			<div class="invalid-feedback" th:errors="*{categoriaId}"></div>
		</div>

		<div class="mb-3">
			<label class="form-label" for="subcategoriaId">Subcategoria</label>
			<select
				id="subcategoriaId"
				th:field="*{subcategoriaId}"
				class="form-select"
				th:classappend="${#fields.hasErrors('subcategoriaId')} ? ' is-invalid' : ''"
				required>
				<option value="">Selecione a subcategoria</option>
				<th:block th:each="categoria : ${catalogo}">
					<optgroup th:label="${categoria.name}" th:attr="data-category-id=${categoria.id}">
						<option
							th:each="subcategoria : ${categoria.subcategories}"
							th:value="${subcategoria.id}"
							th:text="${subcategoria.name}"
							th:attr="data-category-id=${categoria.id}">
						</option>
					</optgroup>
				</th:block>
			</select>
			<div class="invalid-feedback" th:errors="*{subcategoriaId}"></div>
		</div>

		<div class="mb-3">
			<label class="form-label" for="observacoes">Observações</label>
			<textarea
				th:field="*{observacoes}"
				class="form-control"
				th:classappend="${#fields.hasErrors('observacoes')} ? ' is-invalid' : ''"
				rows="3"
				maxlength="255"></textarea>
			<div class="invalid-feedback" th:errors="*{observacoes}"></div>
		</div>

		<button type="submit" class="btn btn-success" th:text="${despesa.id != null} ? 'Atualizar' : 'Salvar'">Salvar</button>
		<a th:href="@{/despesas}" class="btn btn-secondary ms-2">Cancelar</a>
	</form>

	<script>
		(function() {
			const categoria = document.getElementById('categoriaId');
			const subcategoria = document.getElementById('subcategoriaId');
			if (!categoria || !subcategoria) {
				return;
			}

			const filtrarSubcategorias = function() {
				const categoriaSelecionada = categoria.value;
				const grupos = subcategoria.querySelectorAll('optgroup');
				grupos.forEach(function(grupo) {
					const visivel = !categoriaSelecionada || grupo.dataset.categoryId === categoriaSelecionada;
					grupo.hidden = !visivel;
					grupo.querySelectorAll('option').forEach(function(opcao) {
						opcao.hidden = !visivel;
					});
				});

				const selecionada = subcategoria.options[subcategoria.selectedIndex];
				if (selecionada && selecionada.dataset.categoryId && selecionada.dataset.categoryId !== categoriaSelecionada) {
					subcategoria.value = '';
				}
			};

			categoria.addEventListener('change', filtrarSubcategorias);
			filtrarSubcategorias();
		})();
	</script>
</body>
</html>
