<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Lista de Despesas</title>
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
		rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
		crossorigin="anonymous">
</head>
<body class="container mt-4">
	<div class="mb-4 d-flex justify-content-between align-items-center gap-3 flex-wrap">
		<div>
			<h1 class="h1 mb-1">Minhas Despesas</h1>
			<p class="text-muted mb-0">Controle suas despesas com paginação e edição segura.</p>
		</div>
		<a th:href="@{/despesas/nova}" class="btn btn-primary">Nova Despesa</a>
	</div>

	<div th:if="${mensagemSucesso}" class="alert alert-success" role="alert" th:text="${mensagemSucesso}"></div>
	<div th:if="${mensagemErro}" class="alert alert-danger" role="alert" th:text="${mensagemErro}"></div>

	<div th:if="${#lists.isEmpty(despesas)}" class="alert alert-secondary" role="status">
		Nenhuma despesa cadastrada até o momento.
	</div>

	<div th:unless="${#lists.isEmpty(despesas)}" class="table-responsive">
		<table class="table table-striped table-hover align-middle">
			<thead class="table-dark">
				<tr>
					<th>ID</th>
					<th>Descrição</th>
					<th>Valor</th>
					<th>Vencimento</th>
					<th>Contexto</th>
					<th>Categoria</th>
					<th>Subcategoria</th>
					<th>Status</th>
					<th class="text-end">Ações</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="despesa : ${despesas}">
					<td th:text="${despesa.id}"></td>
					<td th:text="${despesa.descricao}"></td>
					<td th:text="${despesa.valor != null ? 'R$ ' + #numbers.formatDecimal(despesa.valor, 1, 'POINT', 2, 'COMMA') : 'R$ 0,00'}"></td>
					<td th:text="${#temporals.format(despesa.data, 'dd/MM/yyyy')}"></td>
					<td th:text="${despesa.contexto}"></td>
					<td th:text="${despesa.categoria}"></td>
					<td th:text="${despesa.subcategoria}"></td>
					<td th:text="${despesa.status}"></td>
					<td class="text-end">
						<div class="d-inline-flex gap-2">
							<a
								th:href="@{'/despesas/editar/' + ${despesa.id}}"
								class="btn btn-warning btn-sm"
								aria-label="Editar despesa"
							>Editar</a>
							<form th:action="@{'/despesas/' + ${despesa.id} + '/excluir'}" method="post" class="d-inline">
								<button
									type="submit"
									class="btn btn-danger btn-sm"
									onclick="return confirm('Deseja realmente excluir esta despesa?');"
									aria-label="Excluir despesa"
								>Excluir</button>
							</form>
						</div>
					</td>
				</tr>
			</tbody>
		</table>
	</div>

	<nav th:if="${pagina != null && pagina.totalPages > 1}" aria-label="Paginação das despesas">
		<ul class="pagination">
			<li class="page-item" th:classappend="${pagina.first} ? 'disabled'">
				<a class="page-link" th:href="@{/despesas(page=${pagina.number - 1},size=${pagina.size})}">Anterior</a>
			</li>
			<li class="page-item disabled">
				<span class="page-link" th:text="'Página ' + (${pagina.number} + 1) + ' de ' + ${pagina.totalPages}"></span>
			</li>
			<li class="page-item" th:classappend="${pagina.last} ? 'disabled'">
				<a class="page-link" th:href="@{/despesas(page=${pagina.number + 1},size=${pagina.size})}">Próxima</a>
			</li>
		</ul>
	</nav>
</body>
</html>
