<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Lista de Despesas</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
</head>
<body class="container mt-4">
	<div class="mb-5">
		<h1 class="h1">Minhas Despesas</h1>
		<a th:href="@{/despesas/nova}" class="btn btn-primary mb-3"> Nova
			Despesa </a>

		<table class="table table-striped table-hover">
			<thead class="table-dark">
				<tr>
					<th>ID</th>
					<th>Descrição</th>
					<th>Valor</th>
					<th>Data</th>
					<th>Categoria</th>
					<th>Ações</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="despesa : ${despesas}">
					<td th:text="${despesa.id}"></td>
					<td th:text="${despesa.descricao}"></td>
					<td th:text="${despesa.valor != null ? #numbers.formatDecimal(despesa.valor, 1, 'COMMA', 2, 'POINT') : '0,00'}"></td>
					<td th:text="${#temporals.format(despesa.data, 'dd/MM/yyyy')}"></td>
					<td th:text="${despesa.categoria}"></td>
					<td><a th:href="@{'/despesas/editar/' + ${despesa.id}}"
						class="btn btn-warning btn-sm">Editar</a> <a
						th:href="@{'/despesas/deletar/' + ${despesa.id}}"
						class="btn btn-danger btn-sm"
						onclick="return confirm('Deseja realmente excluir esta despesa?');">Excluir</a>
					</td>
				</tr>
			</tbody>
		</table>

	</div>
</body>
</html>
