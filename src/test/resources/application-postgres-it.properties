spring.datasource.url=${TEST_DB_URL:jdbc:postgresql://127.0.0.1:5432/despesasdb}
spring.datasource.username=${TEST_DB_USERNAME:postgres}
spring.datasource.password=${TEST_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
app.security.token-secret=test-api-token-secret-for-postgres-it
app.security.password-reset-secret=test-password-reset-secret-for-postgres-it
app.operational.email-ingestion.key-id=test-operational-key
app.operational.email-ingestion.secret=test-operational-secret
app.operational.email-ingestion.max-clock-skew-seconds=300
app.operational.email-ingestion.nonce-ttl-seconds=300
