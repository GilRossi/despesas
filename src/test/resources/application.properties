spring.datasource.url=jdbc:h2:mem:despesasdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=false
app.security.token-secret=test-api-token-secret-for-tests
app.operational.email-ingestion.key-id=test-operational-key
app.operational.email-ingestion.secret=test-operational-secret
app.operational.email-ingestion.max-clock-skew-seconds=300
app.operational.email-ingestion.nonce-ttl-seconds=300
app.financial-assistant.ai.enabled=false

management.endpoints.web.exposure.include=health,info
