name: Backend CD

on:
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-cd
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build backend image
        run: |
          chmod +x mvnw
          ./mvnw -q -DskipTests spring-boot:build-image \
            -Dspring-boot.build-image.imageName=despesas-backend:${{ github.sha }}
          docker tag "despesas-backend:${{ github.sha }}" despesas-backend:main

      - name: Validate deploy secrets presence
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          if [ -n "${VPS_HOST:-}" ]; then
            echo "VPS_HOST present: yes"
          else
            echo "VPS_HOST present: no"
            exit 1
          fi

          if [ -n "${VPS_SSH_KEY:-}" ]; then
            echo "VPS_SSH_KEY present: yes"
          else
            echo "VPS_SSH_KEY present: no"
            exit 1
          fi

      - name: Create deploy SSH directory
        run: mkdir -p ~/.ssh

      - name: Write deploy SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          umask 077
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key

      - name: Secure deploy SSH key
        run: chmod 600 ~/.ssh/deploy_key

      - name: Validate deploy host resolution
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          if getent ahosts "$VPS_HOST" >/dev/null 2>&1; then
            echo "VPS_HOST resolves: yes"
          else
            echo "VPS_HOST resolves: no"
            exit 1
          fi

      - name: Capture deploy host SSH key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT

          max_attempts=5

          for attempt in $(seq 1 "$max_attempts"); do
            echo "SSH keyscan attempt ${attempt}/${max_attempts}"
            : >"$tmpdir/known_host_entry"
            : >"$tmpdir/ssh-keyscan.stderr"

            if timeout 15 ssh-keyscan -T 10 -H "$VPS_HOST" >"$tmpdir/known_host_entry" 2>"$tmpdir/ssh-keyscan.stderr" && [ -s "$tmpdir/known_host_entry" ]; then
              cat "$tmpdir/known_host_entry" >> ~/.ssh/known_hosts
              echo "ssh-keyscan succeeded: yes"
              exit 0
            fi

            echo "ssh-keyscan succeeded: no"

            if [ "$attempt" -lt "$max_attempts" ]; then
              sleep_seconds=$((attempt * 5))
              echo "Waiting ${sleep_seconds}s before next ssh-keyscan retry"
              sleep "$sleep_seconds"
            fi
          done

          exit 1

      - name: Transfer image to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          docker save "despesas-backend:${{ github.sha }}" | gzip | \
            ssh -i ~/.ssh/deploy_key \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=10 \
              "root@$VPS_HOST" \
              "gunzip | docker load && \
               docker tag 'despesas-backend:${{ github.sha }}' despesas-backend:main"

      - name: Sync deploy contract to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key" \
            deploy/ \
            "root@$VPS_HOST:/opt/despesas/deploy/"

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key "root@$VPS_HOST" bash -s << 'DEPLOY'
          set -euo pipefail
          IMAGE=despesas-backend:main
          set -a
          source /root/envs/despesas/prod/postgres.env
          source /root/envs/despesas/prod/backend.env
          source /root/envs/despesas/prod/n8n.env
          [ -f /root/envs/despesas/prod/google.env ]    && source /root/envs/despesas/prod/google.env    || true
          [ -f /root/envs/despesas/prod/microsoft.env ] && source /root/envs/despesas/prod/microsoft.env || true
          set +a
          export BACKEND_IMAGE="$IMAGE"
          cd /opt/despesas/deploy
          docker compose -f compose.base.yml -f compose.prod.yml up -d --no-deps backend
          docker image prune -f 2>/dev/null || true
          docker inspect despesas-backend-1 --format 'Running: {{.Config.Image}}'
          DEPLOY

      - name: Smoke check
        run: |
          sleep 20
          scripts/runtime/verify-production-surface.sh
